on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          cache: true
          run_install: |
            - args:
                - '--frozen-lockfile'
                - '--prefer-offline'
      - run: pnpm exec eslint .
